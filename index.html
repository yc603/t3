<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐！</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 id="title">🎉 生日快乐！ 🎉</h1>
            <p id="message">点击下方的蛋糕，查看我对你的祝福吧！</p>
            <div id="cake-container" onclick="showSurprise()">
                <div class="cake">🎂</div>
            </div>
            <div id="surprise" class="hidden">
                <p class="wish-text">祝你新的一岁：<br>眼里有光，心中有爱，<br>所得皆所愿，所行皆坦途！✨</p>
                <button onclick="location.reload()">再看一次</button>
            </div>
        </div>
    </div>

    <script>
        function showSurprise() {
            document.getElementById('cake-container').classList.add('hidden');
            document.getElementById('surprise').classList.remove('hidden');
            document.body.style.backgroundColor = "#ffedff";
        }
    </script>
</body>
</html>
