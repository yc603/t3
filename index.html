<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎂</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="bgm" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <section id="scene1" class="scene active">
        <div id="intro-text">
            <h1>欢迎，等你很久了~</h1>
            <p>点击屏幕开启挑战</p>
        </div>
        <div id="quiz-container" class="hidden">
            <div class="quiz-card">
                <h2 id="question">加载中...</h2>
                <div id="options"></div>
                <div id="progress">进度: 0 / 10</div>
            </div>
        </div>
    </section>

    <section id="scene2" class="scene">
        <div class="cake-box">
            <h2>许个愿，点击蛋糕吹灭蜡烛吧</h2>
            <div class="cake" id="cake">
                <div class="candle"><div class="flame"></div></div>
                <div class="layer layer-bottom"></div>
                <div class="layer layer-middle"></div>
                <div class="layer layer-top"></div>
            </div>
        </div>
    </section>

    <section id="scene3" class="scene">
        <div class="envelope-wrapper" id="envelope">
            <div class="envelope">
                <div class="letter">
                    <p>致最亲爱的你：</p>
                    <p>希望你这一年比去年更快乐，<br>所有的好运都与你不期而遇。</p>
                </div>
            </div>
        </div>
        <p class="hint">点击信封开启惊喜</p>
    </section>

    <section id="scene4" class="scene">
        <div class="greeting-card">
            <div class="card-content">
                <h2>Happy Birthday!</h2>
                <div class="divider"></div>
                <p>愿你眼里有光，心中有爱，<br>所得皆所愿，所行皆坦途。</p>
                <button onclick="nextScene(4)">最后一步</button>
            </div>
        </div>
    </section>

    <section id="scene5" class="scene">
        <div id="ending">
            <h1 class="glow-text">永远开心，生日快乐！❤️</h1>
            <canvas id="fireworks"></canvas>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
